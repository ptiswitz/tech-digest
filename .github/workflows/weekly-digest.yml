# .github/workflows/weekly-digest.yml
name: Tech Digest

on:
  schedule:
    - cron: '0 11 * * 1'   # Lundi 7h00 heure de Montréal (UTC-4)
  workflow_dispatch:         # Déclenchement manuel aussi

permissions:
  contents: write            # Pour pusher docs/index.html

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-digest.js

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: weekly digest $(date +%Y-%m-%d)"
          git push
